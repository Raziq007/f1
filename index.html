<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 2025 Hub Homepage</title>
    <link rel="stylesheet" href="f1.css">
</head>
<body>

    <!-- Main Scrolling Layout Wrapper -->
    <div class="scroll-container">
        
        <!-- Section 1: Sticky Logo Header (Acts as Home Button) -->
        <div class="page-section sticky-header">
            <a href="#" class="home-button" title="Scroll to Top">
                <img src="img/f12025.jpg" alt="F1 2025 Logo">
            </a>
        </div>

        <!-- Section 2: Big Race Track Action -->
        <div class="page-section">
            <img src="img/f1 race 1.jpg" alt="F1 Racing Group Grid">
        </div>

        <!-- Section 3: Championship Overview & Calendar -->
        <div class="page-section">
            <img src="img/2homepage.jpg" alt="2025 FIA Formula One World Championship Calendar">
        </div>

        <!-- Section 4: Driver Standings / Results -->
        <div class="page-section">
            <img src="img/3homepage.jpg" alt="Podium Results Standings">
        </div>

        <!-- Section 5: Team Selection Roster Footer -->
        <div class="page-section team-footer-section">
            <img src="img/4homepage.jpg" alt="2025 F1 Teams Grid Base">
            
            <div class="teams-interaction-grid">
                <!-- LEFT COLUMN (Top to Bottom) -->
                <a href="Mclaren.html" class="team-link" title="View McLaren Details"><img src="img/Mclaren.jpg" alt="McLaren Team Banner" class="hover-card"></a>

                <a href="Redbull.html" class="team-link" title="View Red Bull Racing Details"><img src="img/Redbulls.jpg" alt="Red Bulls Team Banner" class="hover-card"></a>

               <a href="Aston Martin.html" class="team-link" title="View Aston Martin Details"><img src="img/Aston martin.jpg" alt="Aston Martin Team Banner" class="hover-card"></a>
               
                <a href="Haas.html" class="team-link" title="View Haas Details"><img src="img/Haas.jpg" alt="Haas Team Banner" class="hover-card"></a>

               <a href="Williams.html" class="team-link" title="View Williams Details"><img src="img/Williams.jpg" alt="Williams Team Banner" class="hover-card"></a>
               

                <!-- RIGHT COLUMN (Top to Bottom) -->
                <a href="Ferrari.html" class="team-link" title="View Ferrari Details"><img src="img/Ferrari.jpg" alt="Ferrari Team Banner" class="hover-card"></a>

                <a href="Mercedes.html" class="team-link" title="View Mercedes Details"><img src="img/Mercedes.jpg" alt="Mercedes Team Banner" class="hover-card"></a>
                </a>
                <a href="Alpine.html" class="team-link" title="View Alpine Details"><img src="img/Alpine.jpg" alt="Alpine Team Banner" class="hover-card"></a>
                
                <a href="RacingBulls.html" class="team-link" title="View Racing Bulls Details"><img src="img/Racing Bulls.jpg" alt="Racing Bulls Team Banner" class="hover-card"></a>

                <a href="Sauber.html" class="team-link" title="View Sauber Details"><img src="img/Sauber.jpg" alt="Sauber Team Banner" class="hover-card"></a>

            </div>
        </div>

    </div>

</body>
</html>
